<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 452" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace">
  <defs>
    <style>
      .win{fill:#0b0f19;stroke:#2a3550;stroke-width:1.5}
      .bar{fill:#0f1525}
      .prompt{fill:#22d3ee}
      .key{fill:#3b82f6}
      .str{fill:#10b981}
      .fg{fill:#dbe2ee}
      .muted{fill:#93a1b8}
      .dim{fill:#5d6b85}
    </style>
  </defs>
  <rect width="880" height="452" rx="12" class="win"/>
  <rect width="880" height="36" rx="12" class="bar"/>
  <rect y="24" width="880" height="12" class="bar"/>
  <circle cx="22" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="18" r="6" fill="#27c93f"/>
  <text x="440" y="23" text-anchor="middle" class="dim" font-size="12">research agent — offline, no API key</text>

  <g font-size="13.5">
    <text x="20" y="68"><tspan class="prompt">$ </tspan><tspan class="fg">python examples/run_research_agent.py</tspan></text>
    <text x="20" y="98" class="fg">GOAL: Search and explain what the EU AI Act is.</text>
    <text x="20" y="116" class="dim">------------------------------------------------------------</text>
    <text x="20" y="140"><tspan class="muted">{</tspan><tspan class="key">"span"</tspan><tspan class="muted">: </tspan><tspan class="str">"plan"</tspan><tspan class="muted">, "duration_ms": 1.0, "goal": "..."}</tspan></text>
    <text x="20" y="162"><tspan class="muted">{</tspan><tspan class="key">"span"</tspan><tspan class="muted">: </tspan><tspan class="str">"think"</tspan><tspan class="muted">, "step": 1, "tool_call": </tspan><tspan class="str">"knowledge_search"</tspan><tspan class="muted">}</tspan></text>
    <text x="20" y="184"><tspan class="muted">{</tspan><tspan class="key">"span"</tspan><tspan class="muted">: </tspan><tspan class="str">"hitl"</tspan><tspan class="muted">, "tool": "knowledge_search", "approved": </tspan><tspan class="str">true</tspan><tspan class="muted">}</tspan></text>
    <text x="20" y="206"><tspan class="muted">{</tspan><tspan class="key">"span"</tspan><tspan class="muted">: </tspan><tspan class="str">"act"</tspan><tspan class="muted">, "tool": "knowledge_search", "observation": "..."}</tspan></text>
    <text x="20" y="228"><tspan class="muted">{</tspan><tspan class="key">"span"</tspan><tspan class="muted">: </tspan><tspan class="str">"think"</tspan><tspan class="muted">, "step": 2, "tool_call": </tspan><tspan class="str">null</tspan><tspan class="muted">}</tspan></text>
    <text x="20" y="250" class="dim">------------------------------------------------------------</text>
    <text x="20" y="278"><tspan class="key">ANSWER:  </tspan><tspan class="fg">Done. The EU AI Act classifies systems by risk:</tspan></text>
    <text x="20" y="296"><tspan class="fg">         unacceptable, high, limited, minimal.</tspan></text>
    <text x="20" y="320"><tspan class="key">STEPS:   </tspan><tspan class="fg">2</tspan></text>
    <text x="20" y="342"><tspan class="key">ACTIONS: </tspan><tspan class="fg">1 approved / 0 denied</tspan></text>
    <text x="20" y="378" class="prompt">$ pytest -q</text>
    <text x="20" y="400"><tspan class="str">.....</tspan><tspan class="muted">                                       [100%]</tspan></text>
    <text x="20" y="422" class="str">5 passed in 0.01s</text>
  </g>
</svg>
