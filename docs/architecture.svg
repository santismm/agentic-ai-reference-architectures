<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <style>
      .bg{fill:#070a13}
      .card{fill:#0b0f19;stroke:#2a3550;stroke-width:1.5;rx:12}
      .loop{fill:#0f1525;stroke:#22d3ee;stroke-width:1.5}
      .ink{fill:#f8fafc}
      .fg{fill:#dbe2ee}
      .muted{fill:#93a1b8}
      .faint{fill:#5d6b85}
      .mono{font-family:'JetBrains Mono','SF Mono',monospace}
      .h{font-weight:700}
      .grid{stroke:#1b2336;stroke-width:1}
    </style>
  </defs>

  <rect class="bg" width="1000" height="600"/>
  <g class="grid" opacity="0.5">
    <line x1="0" y1="120" x2="1000" y2="120"/>
    <line x1="0" y1="480" x2="1000" y2="480"/>
  </g>

  <text x="40" y="56" class="ink h" font-size="26">agentic-ai-reference-architectures</text>
  <text x="40" y="84" class="muted" font-size="15">An agent is not a prompt — it is a small system of six composable, testable concerns.</text>

  <!-- The loop -->
  <g>
    <text x="500" y="158" text-anchor="middle" class="faint mono" font-size="12">THE LOOP</text>
    <g transform="translate(0,0)">
      <rect class="loop" x="120" y="175" width="150" height="58" rx="10"/>
      <text x="195" y="200" text-anchor="middle" class="ink h" font-size="15">Plan</text>
      <text x="195" y="220" text-anchor="middle" class="muted" font-size="11">decompose goal</text>

      <rect class="loop" x="310" y="175" width="150" height="58" rx="10"/>
      <text x="385" y="200" text-anchor="middle" class="ink h" font-size="15">Think</text>
      <text x="385" y="220" text-anchor="middle" class="muted" font-size="11">model decides</text>

      <rect class="loop" x="500" y="175" width="150" height="58" rx="10" stroke="#10b981"/>
      <text x="575" y="200" text-anchor="middle" class="ink h" font-size="15">HITL gate</text>
      <text x="575" y="220" text-anchor="middle" class="muted" font-size="11">approve / deny</text>

      <rect class="loop" x="690" y="175" width="150" height="58" rx="10"/>
      <text x="765" y="200" text-anchor="middle" class="ink h" font-size="15">Act</text>
      <text x="765" y="220" text-anchor="middle" class="muted" font-size="11">call a tool</text>
    </g>

    <!-- arrows across -->
    <g stroke="url(#accent)" stroke-width="2" fill="none" marker-end="url(#arrow)">
      <line x1="270" y1="204" x2="305" y2="204"/>
      <line x1="460" y1="204" x2="495" y2="204"/>
      <line x1="650" y1="204" x2="685" y2="204"/>
    </g>
    <!-- observe feedback loop -->
    <path d="M765 233 L765 270 L385 270 L385 235" stroke="#22d3ee" stroke-width="2" fill="none" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
    <text x="575" y="288" text-anchor="middle" class="faint" font-size="12">observe -> think (until plan complete)</text>

    <defs>
      <marker id="arrow" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 Z" fill="#22d3ee"/>
      </marker>
    </defs>
  </g>

  <!-- Supporting concerns -->
  <g>
    <text x="500" y="338" text-anchor="middle" class="faint mono" font-size="12">CROSS-CUTTING CONCERNS</text>

    <rect class="card" x="40" y="356" width="210" height="96" rx="12"/>
    <text x="60" y="384" class="ink h" font-size="15">Tools</text>
    <text x="60" y="408" class="muted" font-size="12">Declarative schema +</text>
    <text x="60" y="426" class="muted" font-size="12">side-effect flagging for</text>
    <text x="60" y="444" class="muted" font-size="12">the HITL gate.</text>

    <rect class="card" x="270" y="356" width="210" height="96" rx="12"/>
    <text x="290" y="384" class="ink h" font-size="15">Memory</text>
    <text x="290" y="408" class="muted" font-size="12">Working scratchpad +</text>
    <text x="290" y="426" class="muted" font-size="12">episodic recall (pluggable</text>
    <text x="290" y="444" class="muted" font-size="12">vector store).</text>

    <rect class="card" x="500" y="356" width="210" height="96" rx="12"/>
    <text x="520" y="384" class="ink h" font-size="15">Observability</text>
    <text x="520" y="408" class="muted" font-size="12">Structured JSON spans</text>
    <text x="520" y="426" class="muted" font-size="12">for every step — drop into</text>
    <text x="520" y="444" class="muted" font-size="12">any log pipeline.</text>

    <rect class="card" x="730" y="356" width="230" height="96" rx="12"/>
    <text x="750" y="384" class="ink h" font-size="15">Evaluation</text>
    <text x="750" y="408" class="muted" font-size="12">Offline eval suite runs</text>
    <text x="750" y="426" class="muted" font-size="12">in CI on every change —</text>
    <text x="750" y="444" class="muted" font-size="12">catch silent regressions.</text>
  </g>

  <!-- Model abstraction -->
  <rect x="40" y="506" width="920" height="64" rx="12" fill="#0f1525" stroke="#2a3550" stroke-width="1.5"/>
  <text x="60" y="534" class="ink h" font-size="15">Model abstraction</text>
  <text x="60" y="556" class="muted mono" font-size="12">LLM protocol</text>
  <text x="245" y="544" class="fg mono" font-size="13">EchoModel (offline, deterministic)  ·  Vertex AI adapter (optional)  ·  bring your own</text>
</svg>
